name: Publish to crates.io

on:
  push:
    tags:
      - "v*"

permissions: read-all

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: crates-io
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust stable
        # stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Verify tag matches crate version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [[ ! "${TAG_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag version (${TAG_VERSION}) is not valid semver."
            exit 1
          fi

          CRATE_VERSION="$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n1)"
          if [[ -z "${CRATE_VERSION}" ]]; then
            echo "::error::Unable to parse crate version from Cargo.toml"
            exit 1
          fi
          if [[ "${TAG_VERSION}" != "${CRATE_VERSION}" ]]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match Cargo.toml version (${CRATE_VERSION})"
            exit 1
          fi

          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "::error::Tagged commit ${GITHUB_SHA} is not on origin/main."
            exit 1
          fi

          echo "version=${CRATE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing version ${CRATE_VERSION}"

      - name: Run tests
        run: cargo test --locked --all-features --verbose

      - name: cargo-deny
        # v2
        uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979
        with:
          arguments: --all-features

      - name: Dry-run publish
        run: cargo publish --dry-run --locked

      - name: Build crate archive for provenance
        run: cargo package --locked

      - name: Generate subject hashes
        id: hash
        run: |
          echo "hashes=$(sha256sum target/package/sbom-tools-*.crate | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@bbed7d2c189ab94089df7c9ac0aee2f82f72d2ee # v1
        id: auth

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        shell: bash
        run: |
          OUTPUT=$(cargo publish --locked 2>&1) && {
            echo "$OUTPUT"
            echo "Published successfully"
          } || {
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -qE "already uploaded|already exists"; then
              echo "::warning::Crate version already published — skipping"
            else
              exit 1
            fi
          }

  provenance:
    needs: [publish]
    permissions:
      actions: read
      id-token: write
      contents: write
    # Must reference by tag, not SHA — generator requirement
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.publish.outputs.hashes }}"
      upload-assets: false
      provenance-name: sbom-tools.intoto.jsonl

  build-binaries:
    name: Build ${{ matrix.target }}
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_name: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            archive_name: linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            archive_name: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_name: macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_name: windows-x86_64
    steps:
      - name: Checkout
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Verify tagged commit is on main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${{ github.sha }}" "origin/main"; then
            echo "::error::Tagged commit ${{ github.sha }} is not on origin/main — refusing to build."
            exit 1
          fi

      - name: Install Rust stable
        # stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Add cross-compilation target
        # rust-toolchain.toml overrides the dtolnay action's toolchain,
        # so we must explicitly add the target for the pinned toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          cat >> ~/.cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Install cosign
        # v4.1.0
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003

      - name: Build release binary
        run: cargo build --release --locked --all-features --target ${{ matrix.target }}

      - name: Package binary (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ARCHIVE="sbom-tools-${{ matrix.archive_name }}.tar.gz"
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/sbom-tools" staging/
          cp LICENSE README.md staging/
          tar -czf "${ARCHIVE}" -C staging .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "sbom-tools-${{ matrix.archive_name }}.zip"
          New-Item -ItemType Directory -Force staging
          Copy-Item "target/${{ matrix.target }}/release/sbom-tools.exe" staging/
          Copy-Item LICENSE, README.md staging/
          Compress-Archive -Path staging/* -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          if command -v sha256sum &>/dev/null; then
            SHA_CMD="sha256sum"
          else
            SHA_CMD="shasum -a 256"
          fi
          ${SHA_CMD} "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"

      - name: Sign archive with Sigstore
        shell: bash
        run: |
          cosign sign-blob --yes \
            --bundle "${{ env.ARCHIVE }}.bundle" \
            "${{ env.ARCHIVE }}"

      - name: Attest build provenance
        # v4.1.0
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: ${{ env.ARCHIVE }}

      - name: Upload binary artifact
        # v4
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: binary-${{ matrix.archive_name }}
          path: |
            sbom-tools-${{ matrix.archive_name }}.*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [publish, provenance, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      id-token: write
    steps:
      - name: Checkout
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust stable
        # stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Install cosign
        # v4.1.0
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003

      - name: Install cargo-sbom
        run: cargo install cargo-sbom --locked

      - name: Generate SBOMs
        run: |
          cargo sbom --output-format cyclone_dx_json_1_6 > sbom-tools.cdx.json
          cargo sbom --output-format spdx_json_2_3 > sbom-tools.spdx.json

      - name: Download SLSA provenance
        # v4
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: sbom-tools.intoto.jsonl
          path: provenance/

      - name: Download all binary artifacts
        # v4
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: binary-*
          path: binaries/
          merge-multiple: true

      - name: Combine checksums
        run: |
          cat binaries/*.sha256 | sort > checksums.sha256
          echo "=== Combined checksums ==="
          cat checksums.sha256

      - name: List release assets
        run: |
          echo "=== SBOMs ==="
          ls -la sbom-tools.cdx.json sbom-tools.spdx.json
          echo "=== Provenance ==="
          ls -la provenance/
          echo "=== Binaries ==="
          ls -la binaries/
          echo "=== Checksums ==="
          ls -la checksums.sha256

      - name: Generate release asset manifest
        shell: bash
        run: |
          set -euo pipefail
          # Create a comprehensive manifest of ALL release assets for tamper detection.
          # The tag-integrity workflow verifies this daily.
          MANIFEST="release-manifest.sha256"
          {
            echo "# sbom-tools ${{ github.ref_name }} release manifest"
            echo "# Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "# Commit: ${{ github.sha }}"
            echo "# Workflow: ${{ github.run_id }}"
            # Hash all assets that will be uploaded
            if command -v sha256sum &>/dev/null; then
              SHA_CMD="sha256sum"
            else
              SHA_CMD="shasum -a 256"
            fi
            ${SHA_CMD} sbom-tools.cdx.json sbom-tools.spdx.json checksums.sha256 provenance/sbom-tools.intoto.jsonl
            for f in binaries/sbom-tools-*; do
              case "${f}" in *.sha256) continue ;; esac
              ${SHA_CMD} "${f}"
            done
          } > "${MANIFEST}"
          echo "=== Release Manifest ==="
          cat "${MANIFEST}"

      - name: Sign release manifest with Sigstore
        shell: bash
        run: |
          cosign sign-blob --yes \
            --bundle "release-manifest.sha256.bundle" \
            "release-manifest.sha256"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          ASSETS=()
          ASSETS+=(sbom-tools.cdx.json)
          ASSETS+=(sbom-tools.spdx.json)
          ASSETS+=(checksums.sha256)
          ASSETS+=(provenance/sbom-tools.intoto.jsonl)
          ASSETS+=(release-manifest.sha256)
          ASSETS+=(release-manifest.sha256.bundle)
          # Add archives and Sigstore bundles, skip per-file .sha256
          for f in binaries/sbom-tools-*; do
            case "${f}" in *.sha256) continue ;; esac
            ASSETS+=("${f}")
          done
          echo "Uploading ${#ASSETS[@]} assets:"
          printf '  %s\n' "${ASSETS[@]}"
          gh release create "${{ github.ref_name }}" \
            "${ASSETS[@]}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag

  update-homebrew:
    name: Update Homebrew tap
    needs: [publish, release]
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Wait for release assets to be available
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          # Verify the source tarball is downloadable
          for i in $(seq 1 10); do
            if gh api "repos/${{ github.repository }}/tarball/${TAG}" \
                 --method HEAD 2>/dev/null; then
              echo "Source tarball available"
              exit 0
            fi
            echo "Waiting for source tarball... (attempt ${i}/10)"
            sleep 5
          done
          echo "::error::Source tarball not available after 50s"
          exit 1

      - name: Verify tagged commit is on main
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          COMMIT="${{ github.sha }}"
          # Double-check ancestry even though publish (which we depend on) already verified
          ANCESTORS=$(gh api "repos/${{ github.repository }}/compare/main...${COMMIT}" --jq '.status')
          if [[ "${ANCESTORS}" != "identical" && "${ANCESTORS}" != "behind" ]]; then
            echo "::error::Tagged commit ${COMMIT} is not on main (status: ${ANCESTORS})"
            exit 1
          fi

      - name: Download source tarball and compute SHA256
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.publish.outputs.version }}"
          COMMIT="${{ github.sha }}"
          # Pin to immutable commit SHA, not the mutable tag ref
          URL="https://github.com/${{ github.repository }}/archive/${COMMIT}.tar.gz"

          curl -sSL -o source.tar.gz "${URL}"
          SHA256="$(shasum -a 256 source.tar.gz | awk '{print $1}')"

          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Source tarball SHA256: ${SHA256} (pinned to commit ${COMMIT})"

      - name: Checkout Homebrew tap
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: sbom-tool/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.sha.outputs.version }}"
          URL="${{ steps.sha.outputs.url }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"

          cat > tap/Formula/sbom-tools.rb << 'FORMULA_EOF'
          class SbomTools < Formula
            desc "Semantic SBOM diff and analysis tool"
            homepage "https://github.com/sbom-tool/sbom-tools"
          FORMULA_EOF

          cat >> tap/Formula/sbom-tools.rb << FORMULA_EOF
            # URL pinned to immutable commit SHA (not mutable tag) for supply chain safety
            url "${URL}"
            version "${VERSION}"
            sha256 "${SHA256}"
          FORMULA_EOF

          cat >> tap/Formula/sbom-tools.rb << 'FORMULA_EOF'
            license "MIT"

            depends_on "rust" => :build

            def install
              system "cargo", "install", *std_cargo_args
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/sbom-tools --version")

              # Verify it can parse a minimal CycloneDX SBOM
              (testpath/"test.cdx.json").write <<~JSON
                {
                  "bomFormat": "CycloneDX",
                  "specVersion": "1.4",
                  "version": 1,
                  "components": []
                }
              JSON
              output = shell_output("#{bin}/sbom-tools view #{testpath}/test.cdx.json --output summary")
              assert_match "CycloneDX", output
            end
          end
          FORMULA_EOF

      - name: Validate formula syntax
        run: ruby -c tap/Formula/sbom-tools.rb

      - name: Tap and audit formula
        run: |
          brew tap sbom-tool/tap
          # Overwrite the remote formula with the locally-updated version
          cp tap/Formula/sbom-tools.rb "$(brew --repo)/Library/Taps/sbom-tool/homebrew-tap/Formula/sbom-tools.rb"
          brew audit --formula sbom-tool/tap/sbom-tools

      - name: Install and test formula
        run: |
          brew install --build-from-source sbom-tool/tap/sbom-tools
          brew test sbom-tool/tap/sbom-tools
          sbom-tools --version
        timeout-minutes: 15

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          cd tap
          VERSION="${{ steps.sha.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/sbom-tools.rb
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "sbom-tools ${VERSION}"
          git push
